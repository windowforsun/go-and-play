<!DOCTYPE html>
<!-- ⚠️ 브레인스토밍 목업 — 정식 코드 아님. 디자인 컨셉 C(젤리 팝) 비교용. -->
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>컨셉 C · 젤리 팝 — 고 앤 플레이</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Jua&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#5a4a6a; --pink:#ff8fb1; --pink2:#ff5c8a; --mint:#5fd0c5; --mint2:#38b6aa;
    --yellow:#ffcf5c; --purple:#a78bfa; --blue:#7cb8ff; --coral:#ff9a76;
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  body{
    font-family:'Jua',sans-serif; color:var(--ink); min-height:100vh; padding:24px 16px 60px;
    background:linear-gradient(160deg,#fbe9ff 0%,#e9f3ff 45%,#e5fff6 100%);
  }
  .wrap{max-width:520px; margin:0 auto;}
  .badge{display:inline-block; font-size:14px; color:#fff; padding:6px 16px; margin-bottom:18px;
    background:linear-gradient(135deg,var(--purple),var(--pink)); border-radius:999px;
    box-shadow:0 6px 14px rgba(167,139,250,.4);}
  header{text-align:center; margin-bottom:28px;}
  .logo{font-size:46px; line-height:1.1; letter-spacing:1px;
    background:linear-gradient(135deg,#ff5c8a,#a78bfa 60%,#5fd0c5);
    -webkit-background-clip:text; background-clip:text; -webkit-text-fill-color:transparent;
    filter:drop-shadow(0 4px 6px rgba(167,139,250,.35));}
  .tag{font-size:17px; color:#8a7d9a; margin-top:14px; line-height:1.6;}
  .grid{display:grid; grid-template-columns:1fr 1fr; gap:16px; margin:26px 0;}
  .card{background:#fff; border-radius:26px; padding:22px 12px; text-align:center; cursor:pointer;
    box-shadow:0 8px 20px rgba(150,130,200,.18), inset 0 -4px 0 rgba(150,130,200,.10);
    transition:transform .14s cubic-bezier(.34,1.56,.64,1), box-shadow .14s;}
  .card:hover{transform:translateY(-4px); box-shadow:0 14px 28px rgba(150,130,200,.28);}
  .card:active{transform:translateY(2px) scale(.97); box-shadow:0 4px 10px rgba(150,130,200,.2);}
  .card .ic{font-size:38px; display:flex; align-items:center; justify-content:center; margin:0 auto 10px;
    width:64px; height:64px; border-radius:20px;}
  .card:nth-child(1) .ic{background:linear-gradient(135deg,#ffd0de,#ffb3c9)}
  .card:nth-child(2) .ic{background:linear-gradient(135deg,#cfeeff,#a9dcff)}
  .card:nth-child(3) .ic{background:linear-gradient(135deg,#fff0c2,#ffe08a)}
  .card:nth-child(4) .ic{background:linear-gradient(135deg,#d3ffe9,#a8f0cf)}
  .card:nth-child(5) .ic{background:linear-gradient(135deg,#e6ddff,#cbb8ff)}
  .card:nth-child(6) .ic{background:linear-gradient(135deg,#ffe0d0,#ffc2a8)}
  .card .nm{font-size:17px;}
  .panel{background:#fff; border-radius:30px; padding:22px; margin-top:6px;
    box-shadow:0 10px 26px rgba(150,130,200,.2);}
  .panel h2{font-size:20px; margin-bottom:16px; color:var(--pink2);}
  .ladder{display:block; margin:0 auto;}
  .names{display:flex; justify-content:space-around; margin-top:10px;}
  .names span{font-size:15px; color:#fff; padding:4px 12px; border-radius:999px;}
  .names .n1{background:var(--pink2)} .names .n2{background:var(--mint2)}
  .names .n3{background:var(--yellow); color:var(--ink)} .names .n4{background:var(--purple)}
  .cta{display:block; width:100%; margin-top:26px; font-family:inherit; font-size:22px; color:#fff;
    background:linear-gradient(135deg,#ff5c8a,#a78bfa); border:none; padding:18px; border-radius:999px;
    cursor:pointer; box-shadow:0 10px 22px rgba(255,92,138,.4), inset 0 2px 0 rgba(255,255,255,.4);
    transition:transform .14s cubic-bezier(.34,1.56,.64,1);}
  .cta:hover{transform:translateY(-3px);}
  .cta:active{transform:translateY(2px) scale(.98);}
  .foot{margin-top:34px; text-align:center; font-size:15px;}
  .foot a{color:var(--purple);}
</style>
</head>
<body>
  <div class="wrap">
    <div class="badge">🍭 컨셉 C · 젤리 팝 (제 제안)</div>
    <header>
      <div class="logo">GO &amp; PLAY</div>
      <div class="tag">사다리부터 룰렛까지,<br>뽑기 · 술래 정하기 게임 모음</div>
    </header>

    <div class="grid">
      <div class="card"><span class="ic">🪜</span><span class="nm">사다리 타기</span></div>
      <div class="card"><span class="ic">🎡</span><span class="nm">룰렛</span></div>
      <div class="card"><span class="ic">👆</span><span class="nm">손가락 짚기</span></div>
      <div class="card"><span class="ic">🎴</span><span class="nm">제비뽑기</span></div>
      <div class="card"><span class="ic">💣</span><span class="nm">폭탄 돌리기</span></div>
      <div class="card"><span class="ic">🎲</span><span class="nm">주사위</span></div>
    </div>

    <div class="panel">
      <h2>🪜 사다리 타기 미리보기</h2>
      <svg class="ladder" width="270" height="150" viewBox="0 0 270 150">
        <g stroke="#e3d9f5" stroke-width="8" fill="none" stroke-linecap="round">
          <line x1="35" y1="14" x2="35" y2="136"/>
          <line x1="115" y1="14" x2="115" y2="136"/>
          <line x1="195" y1="14" x2="195" y2="136"/>
          <line x1="235" y1="14" x2="235" y2="136"/>
        </g>
        <g stroke-width="8" fill="none" stroke-linecap="round">
          <line x1="35" y1="50" x2="115" y2="50" stroke="#ff8fb1"/>
          <line x1="115" y1="84" x2="195" y2="84" stroke="#7cb8ff"/>
          <line x1="195" y1="44" x2="235" y2="44" stroke="#5fd0c5"/>
          <line x1="35" y1="110" x2="115" y2="110" stroke="#a78bfa"/>
        </g>
        <circle cx="35" cy="12" r="9" fill="#ff5c8a"/>
        <circle cx="115" cy="12" r="9" fill="#38b6aa"/>
        <circle cx="195" cy="12" r="9" fill="#ffcf5c"/>
        <circle cx="235" cy="12" r="9" fill="#a78bfa"/>
      </svg>
      <div class="names"><span class="n1">민수</span><span class="n2">지현</span><span class="n3">영후</span><span class="n4">수빈</span></div>
    </div>

    <button class="cta">게임 시작하기 ✨</button>

    <div class="foot"><a href="./index.html">← 컨셉 비교로 돌아가기</a></div>
  </div>
</body>
</html>
