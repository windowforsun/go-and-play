<!DOCTYPE html>
<!-- ⚠️ 브레인스토밍 목업 — 정식 코드 아님. 디자인 컨셉 A(도트/픽셀) 비교용. -->
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>컨셉 A · 도트/픽셀 — 고 앤 플레이</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/quiple/galmuri/dist/Galmuri11.css">
<style>
  :root{
    --bg:#161634; --bg2:#20204a; --ink:#f4f4ff;
    --pink:#ff5c8a; --cyan:#4ee0d0; --yellow:#ffd93d; --purple:#9b6bff; --green:#6bff95; --orange:#ff9f43;
    --shadow:#000;
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  body{
    font-family:'Galmuri11',monospace; background:var(--bg);
    color:var(--ink); min-height:100vh; image-rendering:pixelated;
    background-image:
      linear-gradient(rgba(255,255,255,.03) 1px,transparent 1px),
      linear-gradient(90deg,rgba(255,255,255,.03) 1px,transparent 1px);
    background-size:16px 16px;
    padding:20px 16px 60px;
  }
  .wrap{max-width:520px; margin:0 auto;}
  .badge{display:inline-block; font-size:11px; background:var(--bg2); color:var(--cyan);
    border:2px solid var(--cyan); padding:4px 8px; margin-bottom:16px;}
  header{text-align:center; margin-bottom:28px;}
  .logo{font-size:34px; line-height:1.3; letter-spacing:1px;
    text-shadow:3px 3px 0 var(--pink), 6px 6px 0 var(--shadow); color:var(--yellow);}
  .logo .amp{color:var(--cyan); text-shadow:3px 3px 0 var(--purple),6px 6px 0 var(--shadow);}
  .tag{font-size:12px; color:#b9b9e6; margin-top:14px; line-height:1.7;}
  .grid{display:grid; grid-template-columns:1fr 1fr; gap:12px; margin:22px 0;}
  .card{background:var(--bg2); border:3px solid var(--ink); padding:16px 12px; text-align:center;
    box-shadow:5px 5px 0 var(--shadow); cursor:pointer; transition:transform .08s, box-shadow .08s;}
  .card:hover{transform:translate(-1px,-1px); box-shadow:7px 7px 0 var(--shadow);}
  .card:active{transform:translate(3px,3px); box-shadow:2px 2px 0 var(--shadow);}
  .card .ic{font-size:34px; display:block; margin-bottom:8px; filter:saturate(1.3);}
  .card .nm{font-size:13px;}
  .card.c1{border-color:var(--pink)} .card.c2{border-color:var(--cyan)}
  .card.c3{border-color:var(--yellow)} .card.c4{border-color:var(--green)}
  .card.c5{border-color:var(--purple)} .card.c6{border-color:var(--orange)}
  .panel{background:var(--bg2); border:3px solid var(--ink); padding:18px; box-shadow:5px 5px 0 var(--shadow); margin-top:8px;}
  .panel h2{font-size:14px; color:var(--yellow); margin-bottom:14px;}
  .ladder{display:block; margin:0 auto; background:#0e0e26; border:2px solid #3a3a70;}
  .names{display:flex; justify-content:space-around; font-size:12px; margin-top:8px;}
  .names span{color:var(--cyan);}
  .cta{display:block; width:100%; margin-top:22px; font-family:inherit; font-size:16px;
    background:var(--pink); color:#fff; border:3px solid var(--ink); padding:16px;
    box-shadow:5px 5px 0 var(--shadow); cursor:pointer;}
  .cta:active{transform:translate(3px,3px); box-shadow:2px 2px 0 var(--shadow);}
  .foot{margin-top:34px; text-align:center; font-size:11px;}
  .foot a{color:var(--cyan);}
  @keyframes blink{50%{opacity:.35}}
  .pin{animation:blink 1s steps(2) infinite; color:var(--pink); font-size:20px;}
</style>
</head>
<body>
  <div class="wrap">
    <div class="badge">▶ 컨셉 A · 도트 / 픽셀</div>
    <header>
      <div class="logo">GO <span class="amp">&amp;</span> PLAY</div>
      <div class="tag">사다리부터 룰렛까지<br>뽑기 · 술래 정하기 게임 모음</div>
    </header>

    <div class="grid">
      <div class="card c1"><span class="ic">🪜</span><span class="nm">사다리 타기</span></div>
      <div class="card c2"><span class="ic">🎡</span><span class="nm">룰렛</span></div>
      <div class="card c3"><span class="ic">👆</span><span class="nm">손가락 짚기</span></div>
      <div class="card c4"><span class="ic">🎴</span><span class="nm">제비뽑기</span></div>
      <div class="card c5"><span class="ic">💣</span><span class="nm">폭탄 돌리기</span></div>
      <div class="card c6"><span class="ic">🎲</span><span class="nm">주사위</span></div>
    </div>

    <div class="panel">
      <h2>◆ 사다리 타기 미리보기</h2>
      <svg class="ladder" width="260" height="140" viewBox="0 0 260 140" shape-rendering="crispEdges">
        <g stroke="#4ee0d0" stroke-width="4">
          <line x1="30" y1="10" x2="30" y2="130"/>
          <line x1="110" y1="10" x2="110" y2="130"/>
          <line x1="190" y1="10" x2="190" y2="130"/>
          <line x1="230" y1="10" x2="230" y2="130" stroke="#9b6bff"/>
        </g>
        <g stroke="#ffd93d" stroke-width="4">
          <line x1="30" y1="45" x2="110" y2="45"/>
          <line x1="110" y1="75" x2="190" y2="75"/>
          <line x1="190" y1="40" x2="230" y2="40"/>
          <line x1="30" y1="100" x2="110" y2="100"/>
        </g>
        <rect x="24" y="4" width="12" height="12" fill="#ff5c8a"/>
        <rect x="104" y="4" width="12" height="12" fill="#6bff95"/>
        <rect x="184" y="4" width="12" height="12" fill="#ffd93d"/>
        <rect x="224" y="4" width="12" height="12" fill="#9b6bff"/>
      </svg>
      <div class="names"><span>민수</span><span>지현</span><span>영후</span><span>수빈</span></div>
    </div>

    <button class="cta">▶ 게임 시작하기 <span class="pin">_</span></button>

    <div class="foot"><a href="./index.html">← 컨셉 비교로 돌아가기</a></div>
  </div>
</body>
</html>
